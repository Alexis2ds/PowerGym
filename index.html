<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bienvenido a la familia PowerGym</title>
    <!-- Conexión con tus estilos centralizados -->
    <link rel="stylesheet" href="css/Style.css">
</head>
<body>

    <main class="welcome-container">
      <!-- Encabezado de Bienvenida -->
        <header class="welcome-header">
            <h1>Bienvenido a la familia <span class="brand-red">PowerGym</span></h1>
            <p>Selecciona tu sucursal y empieza a transformar tu cuerpo hoy mismo.</p>
        </header>

        <!-- Contenedor de las 3 Sucursales -->
        <section class="sedes-grid">
             <!-- Contenedor Power gym -->
            <a href="sedes/powergym.html" class="sede-card sede-card-red">
                <div class="sede-image-wrapper">
                   <img src="img/imagenespowergym/Logogym.jpeg" alt="PowerGym Sucursal">
                </div>
                <div class="sede-info">
                    <h2>PowerGym</h2>
                    <span class="btn-select text-red">Ingresar →</span>
                </div>
            </a>
                  <!-- Contenedor Power fitness -->
            <a href="sedes/powerfitness.html" class="sede-card sede-card-pink">
                <div class="sede-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1540206276907-fbd6cc19f2a6?q=80&w=600" alt="Power Fitness Sucursal">
                </div>
                <div class="sede-info">
                    <h2>Power Fitness</h2>
                    <span class="btn-select text-pink">Ingresar →</span>
                </div>
            </a>
                   <!-- Contenedor Elite gym -->
            <a href="sedes/elitegym.html" class="sede-card sede-card-green">
                <div class="sede-image-wrapper">
                    <img src="https://images.unsplash.com/photo-1517838277536-f5f99be501cd?q=80&w=600" alt="Elite Gym Sucursal">
                </div>
                <div class="sede-info">
                    <h2>Elite Gym</h2>
                    <span class="btn-select text-green">Ingresar →</span>
                </div>
            </a>

        </section>
    </main>

</body>
</html>
